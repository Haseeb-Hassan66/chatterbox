<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatterBox — Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        .header {
            background: #128c7e;
            color: white;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 20px;
        }

        .header button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .header button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 800px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #111b21;
            margin-bottom: 16px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 28px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f0f2f5;
            padding: 12px 20px;
            text-align: left;
            font-size: 13px;
            color: #667781;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f2f5;
            font-size: 14px;
            color: #111b21;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f9fafb;
        }

        .bar-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar {
            height: 8px;
            background: #128c7e;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .rank {
            font-weight: 700;
            color: #128c7e;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #667781;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667781;
        }

        .info-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .info-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
        }

        .info-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #128c7e;
        }

        .info-card .label {
            font-size: 13px;
            color: #667781;
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>ChatterBox — Stats</h1>
        <button onclick="window.location.href='chat.html'">Back to Chat</button>
    </div>

    <div class="container">
        <div class="info-cards">
            <div class="info-card">
                <div class="value" id="totalGroups">—</div>
                <div class="label">Total Groups</div>
            </div>
            <div class="info-card">
                <div class="value" id="totalMessages">—</div>
                <div class="label">Total Messages</div>
            </div>
            <div class="info-card">
                <div class="value" id="mostActive">—</div>
                <div class="label">Most Active Group</div>
            </div>
        </div>

        <p class="section-title">Group Activity (MongoDB Aggregation Pipeline)</p>
        <div class="card">
            <div class="loading" id="loading">Loading stats...</div>
            <table id="statsTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Group Name</th>
                        <th>Messages</th>
                        <th>Activity</th>
                        <th>Last Message</th>
                    </tr>
                </thead>
                <tbody id="statsBody"></tbody>
            </table>
            <div class="empty" id="emptyMsg" style="display:none;">No group activity yet.</div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000/api';

        if (!localStorage.getItem('token')) window.location.href = 'index.html';

        async function loadStats() {
            const res = await fetch(`${API}/stats/group-activity`);
            const data = await res.json();

            document.getElementById('loading').style.display = 'none';

            if (data.length === 0) {
                document.getElementById('emptyMsg').style.display = 'block';
                return;
            }

            const totalMessages = data.reduce((sum, d) => sum + d.messageCount, 0);
            document.getElementById('totalGroups').textContent = data.length;
            document.getElementById('totalMessages').textContent = totalMessages;
            document.getElementById('mostActive').textContent = data[0].groupName;

            const maxCount = data[0].messageCount;
            const tbody = document.getElementById('statsBody');
            tbody.innerHTML = '';
            data.forEach((row, i) => {
                const barWidth = Math.round((row.messageCount / maxCount) * 100);
                const lastMsg = row.lastMessage ? new Date(row.lastMessage).toLocaleDateString() : '—';
                const tr = document.createElement('tr');
                tr.innerHTML = `
        <td class="rank">#${i + 1}</td>
        <td>${row.groupName}</td>
        <td>${row.messageCount}</td>
        <td>
          <div class="bar-wrap">
            <div class="bar" style="width:${barWidth}%"></div>
            <span style="font-size:12px;color:#667781">${barWidth}%</span>
          </div>
        </td>
        <td>${lastMsg}</td>
      `;
                tbody.appendChild(tr);
            });

            document.getElementById('statsTable').style.display = 'table';
        }

        loadStats();
    </script>
</body>

</html>
