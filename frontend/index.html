<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatterBox — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            color: #128c7e;
            font-weight: 700;
        }

        .logo p {
            color: #667781;
            font-size: 14px;
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f2f5;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #667781;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab.active {
            color: #128c7e;
            border-bottom-color: #128c7e;
        }

        .form {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .form.active {
            display: flex;
        }

        input {
            padding: 12px 16px;
            border: 1.5px solid #e9edef;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #128c7e;
        }

        button {
            padding: 12px;
            background: #128c7e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #0f7a6d;
        }

        .msg {
            text-align: center;
            font-size: 13px;
            padding: 8px;
            border-radius: 6px;
            display: none;
        }

        .msg.error {
            background: #fde8e8;
            color: #c0392b;
            display: block;
        }

        .msg.success {
            background: #e8f5e9;
            color: #1b5e20;
            display: block;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <h1>ChatterBox</h1>
            <p>Real-time group chat</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <div id="msg" class="msg"></div>

        <form class="form active" id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username" required />
            <input type="password" id="loginPassword" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>

        <form class="form" id="registerForm">
            <input type="text" id="regUsername" placeholder="Username" required />
            <input type="password" id="regPassword" placeholder="Password" required />
            <input type="password" id="regConfirm" placeholder="Confirm Password" required />
            <button type="submit">Create Account</button>
        </form>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000/api';

        if (localStorage.getItem('token')) {
            window.location.href = 'chat.html';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            document.querySelector(`#${tab}Form`).classList.add('active');
            event.target.classList.add('active');
            showMsg('', '');
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg' + (type ? ' ' + type : '');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'chat.html';
            } catch (err) {
                showMsg(err.message, 'error');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if (password !== confirm) return showMsg('Passwords do not match', 'error');
            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);
                showMsg('Account created! Please login.', 'success');
                switchTab('login');
            } catch (err) {
                showMsg(err.message, 'error');
            }
        });
    </script>
</body>

</html>
