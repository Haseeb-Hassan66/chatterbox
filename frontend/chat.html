<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatterBox</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 360px;
            background: white;
            border-right: 1px solid #e9edef;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px 20px;
            background: #128c7e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 {
            font-size: 18px;
        }

        .sidebar-header .actions {
            display: flex;
            gap: 12px;
        }

        .sidebar-header button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .sidebar-header button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .search-box {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f2f5;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: none;
            background: #f0f2f5;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .groups-list {
            flex: 1;
            overflow-y: auto;
        }

        .group-item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.15s;
        }

        .group-item:hover {
            background: #f0f2f5;
        }

        .group-item.active {
            background: #e7f5f4;
        }

        .group-avatar {
            width: 46px;
            height: 46px;
            background: #128c7e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
        }

        .group-info {
            flex: 1;
            min-width: 0;
        }

        .group-info .name {
            font-weight: 600;
            font-size: 15px;
            color: #111b21;
        }

        .group-info .preview {
            font-size: 13px;
            color: #667781;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: #128c7e;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efeae2;
        }

        .chat-header {
            background: #128c7e;
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header .info h3 {
            font-size: 16px;
        }

        .chat-header .info p {
            font-size: 12px;
            opacity: 0.85;
        }

        .chat-header .hactions {
            display: flex;
            gap: 10px;
        }

        .chat-header .hactions button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .no-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667781;
            font-size: 16px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            word-break: break-word;
        }

        .message.sent {
            background: #d9fdd3;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.received {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message .sender-name {
            font-size: 12px;
            font-weight: 600;
            color: #128c7e;
            margin-bottom: 2px;
        }

        .message .time {
            font-size: 11px;
            color: #667781;
            text-align: right;
            margin-top: 2px;
        }

        .message .delete-btn {
            display: none;
            position: absolute;
            top: 4px;
            right: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: #667781;
            font-size: 12px;
        }

        .message:hover .delete-btn {
            display: block;
        }

        .typing-indicator {
            padding: 4px 20px;
            font-size: 12px;
            color: #667781;
            font-style: italic;
            min-height: 24px;
        }

        .input-area {
            padding: 12px 16px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 24px;
            background: white;
            font-size: 15px;
            outline: none;
        }

        .delete-mode-select {
            padding: 8px;
            border: none;
            border-radius: 8px;
            background: white;
            font-size: 13px;
            color: #667781;
            outline: none;
            cursor: pointer;
        }

        .send-btn {
            width: 42px;
            height: 42px;
            background: #128c7e;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: #0f7a6d;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 28px;
            width: 420px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h3 {
            margin-bottom: 18px;
            color: #111b21;
        }

        .modal input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e9edef;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            margin-bottom: 14px;
        }

        .modal input:focus {
            border-color: #128c7e;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            max-height: 240px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1.5px solid #e9edef;
            transition: all 0.15s;
        }

        .user-item.selected {
            border-color: #128c7e;
            background: #e7f5f4;
        }

        .user-item .uavatar {
            width: 34px;
            height: 34px;
            background: #128c7e;
            border-radius: 50%;
            color: white;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 9px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-cancel {
            background: #f0f2f5;
            color: #667781;
        }

        .btn-create {
            background: #128c7e;
            color: white;
        }

        /* Search modal */
        .search-results {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .search-result-item {
            padding: 10px;
            background: #f0f2f5;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-result-item .sr-content {
            color: #111b21;
        }

        .search-result-item .sr-meta {
            font-size: 12px;
            color: #667781;
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>ChatterBox</h2>
            <div class="actions">
                <button onclick="openCreateGroup()">+ Group</button>
                <button onclick="logout()">Logout</button>
            </div>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Search groups..." oninput="filterGroups(this.value)" />
        </div>
        <div class="groups-list" id="groupsList"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <div class="no-chat" id="noChat">Select a group to start chatting</div>
        <div id="chatView" style="display:none; flex-direction:column; flex:1;">
            <div class="chat-header">
                <div class="info">
                    <h3 id="chatGroupName"></h3>
                    <p id="chatGroupMembers"></p>
                </div>
                <div class="hactions">
                    <button onclick="openSearch()">Search</button>
                    <button onclick="window.location.href='stats.html'">Stats</button>
                </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="input-area">
                <select class="delete-mode-select" id="deleteMode">
                    <option value="manual">Keep forever</option>
                    <option value="24h">Delete after 24h</option>
                    <option value="7d">Delete after 7 days</option>
                </select>
                <input type="text" id="msgInput" placeholder="Type a message..." />
                <button class="send-btn" onclick="sendMessage()">&#10148;</button>
            </div>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div class="modal-overlay" id="createGroupModal">
        <div class="modal">
            <h3>Create New Group</h3>
            <input type="text" id="groupNameInput" placeholder="Group name" />
            <p style="font-size:13px;color:#667781;margin-bottom:10px;">Select members:</p>
            <div class="user-list" id="userList"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeCreateGroup()">Cancel</button>
                <button class="btn-create" onclick="createGroup()">Create</button>
            </div>
        </div>
    </div>

    <!-- Search Modal -->
    <div class="modal-overlay" id="searchModal">
        <div class="modal">
            <h3>Search Messages</h3>
            <input type="text" id="searchInput" placeholder="Type keyword and press Enter..."
                onkeydown="if(event.key==='Enter') searchMessages()" />
            <div class="search-results" id="searchResults"></div>
            <div class="modal-actions" style="margin-top:16px;">
                <button class="btn-cancel" onclick="closeSearch()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000/api';
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');

        if (!token || !user) window.location.href = 'index.html';

        const socket = io('http://127.0.0.1:8000', { transports: ['websocket'] });

        let groups = [];
        let allUsers = [];
        let currentGroup = null;
        let selectedMembers = [];
        let typingTimeout = null;

        // Socket events
        socket.on('connect', () => {
            socket.emit('set_online', { userId: user.id });
        });

        socket.on('new_message', (msg) => {
            if (currentGroup && msg.groupId === currentGroup.id) {
                appendMessage(msg);
                scrollToBottom();
            }
            updateGroupPreview(msg.groupId, msg.content);
        });

        socket.on('message_deleted', (data) => {
            const el = document.getElementById('msg-' + data.messageId);
            if (el) el.remove();
        });

        socket.on('user_typing', (data) => {
            if (currentGroup && data.groupId === currentGroup.id && data.userId !== user.id) {
                document.getElementById('typingIndicator').textContent = `${data.username} is typing...`;
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    document.getElementById('typingIndicator').textContent = '';
                }, 2000);
            }
        });

        socket.on('user_status', (data) => {
            loadGroups();
        });

        // Load groups
        async function loadGroups() {
            const res = await fetch(`${API}/groups/user/${user.id}`);
            groups = await res.json();
            renderGroups(groups);
        }

        function renderGroups(list) {
            const el = document.getElementById('groupsList');
            el.innerHTML = '';
            if (list.length === 0) {
                el.innerHTML = '<p style="text-align:center;color:#667781;padding:20px;font-size:14px;">No groups yet. Create one!</p>';
                return;
            }
            list.forEach(g => {
                const div = document.createElement('div');
                div.className = 'group-item' + (currentGroup?.id === g.id ? ' active' : '');
                div.id = 'group-' + g.id;
                div.onclick = () => openGroup(g);
                div.innerHTML = `
        <div class="group-avatar">${g.name[0].toUpperCase()}</div>
        <div class="group-info">
          <div class="name">${g.name}</div>
          <div class="preview" id="preview-${g.id}">${g.members.length} members</div>
        </div>
      `;
                el.appendChild(div);
            });
        }

        function filterGroups(q) {
            const filtered = groups.filter(g => g.name.toLowerCase().includes(q.toLowerCase()));
            renderGroups(filtered);
        }

        function updateGroupPreview(groupId, content) {
            const el = document.getElementById('preview-' + groupId);
            if (el) el.textContent = content;
        }

        // Open group chat
        async function openGroup(g) {
            currentGroup = g;
            if (currentGroup) socket.emit('leave_group', { groupId: currentGroup.id });
            socket.emit('join_group', { groupId: g.id });

            document.getElementById('noChat').style.display = 'none';
            document.getElementById('chatView').style.display = 'flex';
            document.getElementById('chatGroupName').textContent = g.name;
            document.getElementById('chatGroupMembers').textContent = `${g.members.length} members`;

            document.querySelectorAll('.group-item').forEach(el => el.classList.remove('active'));
            const groupEl = document.getElementById('group-' + g.id);
            if (groupEl) groupEl.classList.add('active');

            const res = await fetch(`${API}/groups/${g.id}/messages`);
            const msgs = await res.json();
            const container = document.getElementById('messages');
            container.innerHTML = '';
            msgs.forEach(m => appendMessage(m));
            scrollToBottom();
        }

        // Append message to chat
        function appendMessage(msg) {
            const container = document.getElementById('messages');
            const isMine = msg.senderId === user.id;
            const div = document.createElement('div');
            div.className = 'message ' + (isMine ? 'sent' : 'received');
            div.id = 'msg-' + msg._id;
            const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const expiryNote = msg.deleteMode !== 'manual' ? ` · ${msg.deleteMode}` : '';
            div.innerHTML = `
      ${!isMine ? `<div class="sender-name">${msg.senderId}</div>` : ''}
      ${msg.content}
      <div class="time">${time}${expiryNote}</div>
      ${isMine ? `<button class="delete-btn" onclick="deleteMessage('${msg._id}')">✕</button>` : ''}
    `;
            container.appendChild(div);
        }

        function scrollToBottom() {
            const el = document.getElementById('messages');
            el.scrollTop = el.scrollHeight;
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if (!content || !currentGroup) return;
            const deleteMode = document.getElementById('deleteMode').value;
            socket.emit('send_message', {
                groupId: currentGroup.id,
                senderId: user.id,
                content,
                deleteMode
            });
            input.value = '';
        }

        // Send on Enter key
        document.getElementById('msgInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
            else {
                socket.emit('typing', {
                    userId: user.id,
                    username: user.username,
                    groupId: currentGroup?.id
                });
            }
        });

        // Delete message
        function deleteMessage(msgId) {
            socket.emit('delete_message', { messageId: msgId, groupId: currentGroup.id });
        }

        // Create group modal
        async function openCreateGroup() {
            selectedMembers = [];
            document.getElementById('groupNameInput').value = '';
            const res = await fetch(`${API}/auth/users`);
            allUsers = await res.json();
            const list = document.getElementById('userList');
            list.innerHTML = '';
            allUsers.filter(u => u.id !== user.id).forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.id = 'user-' + u.id;
                div.onclick = () => toggleMember(u.id, div);
                div.innerHTML = `
        <div class="uavatar">${u.username[0].toUpperCase()}</div>
        <span>${u.username}</span>
      `;
                list.appendChild(div);
            });
            document.getElementById('createGroupModal').classList.add('open');
        }

        function toggleMember(id, el) {
            if (selectedMembers.includes(id)) {
                selectedMembers = selectedMembers.filter(m => m !== id);
                el.classList.remove('selected');
            } else {
                selectedMembers.push(id);
                el.classList.add('selected');
            }
        }

        function closeCreateGroup() {
            document.getElementById('createGroupModal').classList.remove('open');
        }

        async function createGroup() {
            const name = document.getElementById('groupNameInput').value.trim();
            if (!name) return alert('Enter a group name');
            if (selectedMembers.length === 0) return alert('Select at least one member');
            const res = await fetch(`${API}/groups/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, adminId: user.id, members: selectedMembers })
            });
            if (res.ok) {
                closeCreateGroup();
                loadGroups();
            }
        }

        // Search
        function openSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('searchModal').classList.add('open');
        }

        function closeSearch() {
            document.getElementById('searchModal').classList.remove('open');
        }

        async function searchMessages() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q || !currentGroup) return;
            const res = await fetch(`${API}/groups/${currentGroup.id}/search?q=${encodeURIComponent(q)}`);
            const results = await res.json();
            const container = document.getElementById('searchResults');
            container.innerHTML = '';
            if (results.length === 0) {
                container.innerHTML = '<p style="color:#667781;font-size:14px;">No messages found.</p>';
                return;
            }
            results.forEach(m => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                div.innerHTML = `
        <div class="sr-content">${m.content}</div>
        <div class="sr-meta">${new Date(m.createdAt).toLocaleString()}</div>
      `;
                container.appendChild(div);
            });
        }

        function logout() {
            socket.emit('set_offline', { userId: user.id });
            localStorage.clear();
            window.location.href = 'index.html';
        }

        loadGroups();
    </script>
</body>

</html>
